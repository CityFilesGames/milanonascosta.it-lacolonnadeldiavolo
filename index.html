<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milano Nascosta — La Colonna del Diavolo</title>
  <meta name="description" content="Milano Nascosta Tours — La Colonna del Diavolo" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="hero">
    <div class="overlay"></div>

    <video id="bgVideo" class="bg-video" autoplay muted loop playsinline webkit-playsinline preload="auto" controlslist="nodownload noplaybackrate nofullscreen">
      <source src="La%20Colonna%20del%20Diavolo.mp4" type="video/mp4" />
      Il tuo browser non supporta il video HTML5.
    </video>

    <button id="playButton" class="play-button" type="button" aria-label="Avvia video">
      <span class="play-icon"></span>
      <span class="play-label">Avvia video</span>
    </button>

    <section class="content">
      <p class="eyebrow">Milano Nascosta</p>
      <h1>MILANO NASCOSTA</h1>
      <h2>La Colonna del Diavolo</h2>
    </section>

    <footer class="site-footer">
      <p>Milano Nascosta Tours</p>
    </footer>
  </main>

  <script>
    const video = document.getElementById('bgVideo');
    const playButton = document.getElementById('playButton');

    async function tryAutoplay() {
      try {
        video.muted = true;
        video.playsInline = true;
        await video.play();
        document.body.classList.add('is-playing');
      } catch (err) {
        document.body.classList.add('needs-play');
      }
    }

    function startVideo() {
      video.muted = false;
      video.play()
        .then(() => {
          document.body.classList.remove('needs-play');
          document.body.classList.add('is-playing');
        })
        .catch(() => {
          video.muted = true;
          video.play().then(() => {
            document.body.classList.remove('needs-play');
            document.body.classList.add('is-playing');
          });
        });
    }

    playButton.addEventListener('click', startVideo);
    video.addEventListener('click', startVideo);
    window.addEventListener('load', tryAutoplay);
  </script>
</body>
</html>
